<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Test Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-3d-blue {
            color: #60a5fa;
            text-shadow: 0 1px #1e3a8a, 0 2px #1e3a8a, 0 3px #1e40af, 0 4px #1d4ed8;
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <header class="p-6 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center gap-3">
            <div class="p-2 bg-blue-600 rounded-lg text-white font-bold">🎯</div>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight text-3d-blue">AI Mock Test Generator</h1>
                <p class="text-slate-400 text-xs">Transform study material into interactive assessments</p>
            </div>
        </div>
    </header>

    <main class="flex-grow p-6 max-w-4xl mx-auto w-full">
        <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 space-y-4">
            <h2 class="text-sm font-semibold tracking-wider text-blue-400 uppercase">Study Material</h2>
            
            <textarea class="w-full h-48 bg-slate-900 border border-slate-700 rounded-xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition resize-none" placeholder="Paste your paragraphs, notes, or study material here..."></textarea>
            
            <div class="space-y-3">
                <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleMultipleImages(this.files)">
                
                <button id="uploadBtn" onclick="document.getElementById('imageInput').click()" class="w-full bg-slate-800 border border-slate-700 text-slate-200 py-3 px-4 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-700 transition font-medium">
                    📁 <span id="uploadBtnText">Upload Screenshots / Images</span>
                </button>

                <div id="fileTracker" class="hidden bg-slate-900/80 border border-slate-700 rounded-xl p-3 space-y-2">
                    <div class="flex items-center justify-between text-xs text-slate-400">
                        <span id="totalFilesText">0 Files Selected</span>
                        <span id="ocrStatusText" class="text-blue-400 font-medium">Waiting...</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="ocrProgressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <button onclick="generateLocalTest()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg transition">
                Generate Test ⚡
            </button>
        </div>

        <div id="quizContainer" class="mt-6 space-y-4"></div>
    </main>

    <script>
        let accumulatedText = "";

        async function handleMultipleImages(files) {
            if (files.length === 0) return;

            const uploadBtnText = document.getElementById('uploadBtnText');
            const fileTracker = document.getElementById('fileTracker');
            const totalFilesText = document.getElementById('totalFilesText');
            const ocrStatusText = document.getElementById('ocrStatusText');
            const ocrProgressBar = document.getElementById('ocrProgressBar');
            const textArea = document.querySelector('textarea');

            uploadBtnText.innerText = `${files.length} Image(s) Selected ✅`;
            totalFilesText.innerText = `${files.length} File(s) Added`;
            fileTracker.classList.remove('hidden');
            
            accumulatedText = "";
            textArea.value = "";
            
            for (let i = 0; i < files.length; i++) {
                let progressPercent = Math.round((i / files.length) * 100);
                ocrProgressBar.style.width = `${progressPercent}%`;
                ocrStatusText.innerText = `Scanning image ${i + 1} of ${files.length}... ⏳`;

                try {
                    const result = await Tesseract.recognize(files[i], 'eng');
                    accumulatedText += `\n` + result.data.text + `\n`;
                } catch (error) {
                    console.error("Error reading image:", error);
                }
            }

            ocrProgressBar.style.width = '100%';
            ocrStatusText.innerText = "Processing Complete! 🎉";
            textArea.value = accumulatedText.trim();

            setTimeout(() => {
                fileTracker.classList.add('hidden');
                ocrProgressBar.style.width = '0%';
                uploadBtnText.innerText = "Upload Screenshots / Images";
            }, 4000);
        }

        function generateLocalTest() {
            const textContent = document.querySelector('textarea').value.trim();
            const resultContainer = document.getElementById('quizContainer');

            if (!textContent) {
                alert("Please paste some text or upload images first!");
                return;
            }

            // Text lines filter kar ke unke options banana
            const lines = textContent.split('\n').filter(line => line.trim().length > 12);
            let questionsHTML = `<h3 class="text-xl font-bold text-white mb-4 text-3d-blue">Generated Mock Assessment</h3>`;
            let qNum = 1;

            lines.forEach((line) => {
                if (qNum > 5) return; // Top 5 entries ka dynamic quiz
                let clean = line.replace(/[•\-\*]/g, '').trim();
                
                questionsHTML += `
                    <div class="bg-slate-800 border border-slate-700 p-5 rounded-xl mb-4 animate-fade-in">
                        <p class="text-slate-100 font-medium mb-3">Q${qNum}: Identify the correct context related to: "${clean.substring(0, 70)}..."?</p>
                        <div class="space-y-2">
                            <button onclick="checkAnswer(this, true)" class="w-full text-left bg-slate-900 hover:bg-slate-700 text-slate-300 p-3 rounded-lg border border-slate-800 transition">
                                A) True statement based on study reference
                            </button>
                            <button onclick="checkAnswer(this, false)" class="w-full text-left bg-slate-900 hover:bg-slate-700 text-slate-300 p-3 rounded-lg border border-slate-800 transition">
                                B) False context statement
                            </button>
                        </div>
                    </div>
                `;
                qNum++;
            });

            resultContainer.innerHTML = questionsHTML;
        }

        function checkAnswer(button, isCorrect) {
            if (isCorrect) {
                button.className = "w-full text-left bg-green-600/20 border border-green-500 text-green-300 p-3 rounded-lg transition";
            } else {
                button.className = "w-full text-left bg-red-600/20 border border-red-500 text-red-300 p-3 rounded-lg transition";
            }
        }
    </script>
</body>
</html>
