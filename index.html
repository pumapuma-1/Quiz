<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Test Generator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
        .custom-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(71, 85, 105, 0.4); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .text-3d-blue { color: #60a5fa; text-shadow: 0 2px 4px rgba(30, 58, 138, 0.6); }
        .option-btn { background: #0f172a; border: 1px solid #334155; transition: all 0.2s ease; text-align: left; width: 100%; padding: 14px; border-radius: 10px; color: #cbd5e1; font-weight: 500; margin-bottom: 8px; cursor: pointer; }
        .option-btn:hover { background: #1e293b; border-color: #475569; color: #fff; }
    </style>
</head>
<body class="min-h-screen flex flex-col px-4 py-6">

    <header class="max-w-2xl mx-auto w-full mb-6 text-center border-b border-slate-800 pb-4">
        <h1 class="text-3xl font-bold text-3d-blue tracking-tight">AI Mock Test Generator</h1>
        <p class="text-slate-400 text-sm mt-1">Convert your structural notes or images into instant assessments</p>
    </header>

    <main class="max-w-2xl mx-auto w-full flex-grow">
        <div class="custom-card rounded-2xl p-5 space-y-4">
            
            <label class="block text-xs font-bold uppercase tracking-wider text-blue-400">Pasted or Extracted Reference Text</label>
            <textarea id="mainTextArea" class="w-full h-44 bg-slate-950 border border-slate-700 rounded-xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 font-mono text-sm resize-none" placeholder="Your system extracted text will appear here automatically..."></textarea>
            
            <div class="space-y-3">
                <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="processMediaQueue(this.files)">
                <button type="button" onclick="document.getElementById('imageInput').click()" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition">
                    📁 Selection Stack (Upload Images)
                </button>

                <div id="statusIndicator" class="hidden bg-slate-900 border border-blue-500/30 rounded-xl p-4">
                    <div class="flex justify-between items-center text-xs mb-2">
                        <span id="counterLabel" class="text-slate-300 font-medium">Files Queued: 0</span>
                        <span id="engineStatus" class="text-blue-400 font-bold animate-pulse">Initializing Scanner...</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="runtimeProgressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <button type="button" onclick="buildInteractiveAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 px-4 rounded-xl font-bold shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                Generate Interactive Test ⚡
            </button>
        </div>

        <div id="quizRenderBlock" class="mt-6 space-y-4 pb-12"></div>
    </main>

    <script>
        let operationalDataBuffer = "";

        async function processMediaQueue(files) {
            if (!files || files.length === 0) return;

            const targetBox = document.getElementById('mainTextArea');
            const visualWidget = document.getElementById('statusIndicator');
            const countTag = document.getElementById('counterLabel');
            const progressIndicator = document.getElementById('runtimeProgressBar');
            const textState = document.getElementById('engineStatus');

            // Setup tracking view elements configuration
            countTag.innerText = `Files Selected: ${files.length}`;
            visualWidget.classList.remove('hidden');
            operationalDataBuffer = "";
            targetBox.value = "";

            for (let index = 0; index < files.length; index++) {
                let currentProgress = Math.round((index / files.length) * 100);
                progressIndicator.style.width = `${currentProgress}%`;
                textState.innerText = `Extracting Data Image [${index + 1}/${files.length}]... ⏳`;

                try {
                    const trackingData = await Tesseract.recognize(files[index], 'eng');
                    if (trackingData && trackingData.data.text) {
                        operationalDataBuffer += "\n" + trackingData.data.text + "\n";
                    }
                } catch (failureContext) {
                    console.error("OCR Extraction Fault Exception: ", failureContext);
                }
            }

            // Sync structural parameters upon system conclusion
            progressIndicator.style.width = '100%';
            textState.innerText = "All Sheets Analyzed Successfully! 🎉";
            targetBox.value = operationalDataBuffer.trim();

            setTimeout(() => {
                visualWidget.classList.add('hidden');
                progressIndicator.style.width = '0%';
            }, 3500);
        }

        function buildInteractiveAssessment() {
            const rawContent = document.getElementById('mainTextArea').value.trim();
            const compilationNode = document.getElementById('quizRenderBlock');

            if (!rawContent || rawContent.length < 5) {
                alert("Please add notes or load screen logs before validation requests.");
                return;
            }

            // Clean lines array conversion pipeline
            const textLines = rawContent.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 15 && !line.includes('Image(s)'));

            if(textLines.length === 0) {
                alert("The reference text is too short to parse into mock items.");
                return;
            }

            let compilationHTML = `<h3 class="text-xl font-bold text-white mb-2 text-3d-blue">Generated Mock Assessment</h3>`;
            let itemCounter = 1;

            textLines.forEach((entry) => {
                if (itemCounter > 5) return; // Cap response matrix to safe parameters 
                let snippet = entry.replace(/[•\-\*\[\]]/g, '').trim();
                
                compilationHTML += `
                    <div class="bg-slate-800 border border-slate-700/60 p-5 rounded-xl shadow-md">
                        <p class="text-slate-100 font-medium mb-3 text-sm">Q${itemCounter}: Which of the following is most contextually precise regarding: "${snippet.substring(0, 85)}..."?</p>
                        <div class="flex flex-col">
                            <button type="button" onclick="evaluateSelection(this, true)" class="option-btn">
                                A) True matching data framework statement
                            </button>
                            <button type="button" onclick="evaluateSelection(this, false)" class="option-btn">
                                B) False matching alternative context configuration
                            </button>
                        </div>
                    </div>
                `;
                itemCounter++;
            });

            compilationNode.innerHTML = compilationHTML;
        }

        function evaluateSelection(elementNode, validationState) {
            // Prevent duplicated click metrics evaluations
            const baseSiblings = elementNode.parentNode.querySelectorAll('.option-btn');
            baseSiblings.forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.opacity = "0.6";
            });

            elementNode.style.pointerEvents = 'auto';
            if (validationState) {
                elementNode.style.background = "rgba(16, 185, 129, 0.2)";
                elementNode.style.borderColor = "#10b981";
                elementNode.style.color = "#34d399";
            } else {
                elementNode.style.background = "rgba(239, 68, 68, 0.2)";
                elementNode.style.borderColor = "#ef4444";
                elementNode.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
